<!DOCTYPE html>
<html>
<head>
  <title>Chat Privado // NEON_TERMINAL</title>
  <meta name="viewport" content="width=device-width,initial-scale:1.0">
  <style>
    :root {
      /* Paleta General */
      --chat-bg: #0d0d1a;
      --elements-bg: #1a1a2e;
      --text-main: #c0c5ce;
      --text-dim: #7f8c8d;
      --accent-main: #f000ff;
      --accent-bright: #00f0ff;
      
      /* --- TU PALETA PARA BURBUJAS --- */
      --user-rafa-bubble: #3F085E;
      --user-hugo-bubble: #0B6A16;
      --user-sergio-bubble: #0D368C;
      --user-alvaro-bubble: #C2B119;

      /* Colores de texto para las burbujas */
      --text-on-dark-bubble: #ffffff;
      --text-on-light-bubble: #0d0d1a;

      /* Colores Neón (para lista de usuarios) */
      --user-hugo-glow: #aaffb2;
      --user-rafa-glow: #e0aaff;
      --user-alvaro-glow: #fff5a1;
      --user-sergio-glow: #aaccff;

      --font-family: 'Consolas', 'Monaco', monospace;
      --border-radius: 16px;
      --spacing-unit: 0.75rem;
    }

    /* (Animaciones, Body, Scrollbar... sin cambios) */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 15px 3px rgba(240, 0, 255, 0.3); }
      50% { box-shadow: 0 0 25px 8px rgba(240, 0, 255, 0.7); }
      100% { box-shadow: 0 0 15px 3px rgba(240, 0, 255, 0.3); }
    }
    body {
      margin: 0; font-family: var(--font-family); color: var(--text-main);
      background-color: var(--chat-bg);
      background-image: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 6px 100%;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--elements-bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent-main); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-bright); }
    
    /* --- ¡CAMBIOS EN EL LOGIN! --- */
    #login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(13, 13, 26, 0.8);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; backdrop-filter: blur(5px);
    }
    #login-box {
      background-color: var(--elements-bg); padding: 2.5rem;
      border-radius: var(--border-radius); text-align: center;
      border: 1px solid var(--accent-main);
      animation: pulse-glow 3s infinite ease-in-out;
    }
    #login-box h1 {
      margin-top: 0; color: var(--accent-bright); font-weight: 300;
      text-shadow: 0 0 4px var(--accent-bright), 0 0 8px var(--accent-bright);
    }
    #login-box p { color: var(--text-dim); }
    
    /* ¡NUEVO CSS PARA LOGIN VISUAL! */
    #login-profiles {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
    }
    .profile-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease-out;
    }
    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%; /* Círculo */
      border: 3px solid transparent;
      object-fit: cover;
      margin-bottom: 0.5rem;
    }
    .profile-card:hover img {
      border-color: var(--accent-bright);
      transform: scale(1.1);
    }
    .profile-card:hover .profile-name {
      color: var(--accent-bright);
      text-shadow: 0 0 5px var(--accent-bright);
    }
    .profile-name {
      font-size: 1.1rem;
      color: var(--text-main);
      transition: all 0.2s ease-out;
    }
    /* ¡FIN DE CAMBIOS EN LOGIN! */

    /* Chat Container (Sin cambios) */
    #chat-container {
      display: flex; flex-direction: column;
      height: 100vh; visibility: hidden;
    }
    #chat-header {
      background: var(--elements-bg); padding: var(--spacing-unit) * 1.5;
      border-bottom: 1px solid var(--accent-main);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center; z-index: 10;
    }
    #chat-header h2 {
      margin: 0; color: var(--text-main); font-weight: 300;
    }
    #chat-header h2 span {
      color: var(--accent-bright); font-weight: 600;
      text-shadow: 0 0 5px var(--accent-bright);
    }
    #messages {
      list-style-type: none; margin: 0;
      padding: var(--spacing-unit) * 1.5; flex-grow: 1; overflow-y: auto;
    }

    /* Burbujas de Chat */
    #messages li {
      padding: var(--spacing-unit) 1rem; margin-bottom: var(--spacing-unit);
      border-radius: var(--border-radius); max-width: 70%;
      clear: both; word-wrap: break-word; line-height: 1.4;
      animation: fadeIn 0.3s ease-out;
      border: 1px solid transparent;
      position: relative; /* Para el timestamp */
    }
    #messages li.other {
      float: left;
    }
    #messages li.me {
      float: right;
    }
    #messages li.other strong {
      display: block; font-size: 0.8rem;
      margin-bottom: 0.2rem;
      color: inherit;
      opacity: 0.7;
      text-shadow: none;
    }
    #messages li.system {
      background-color: transparent;
      color: #ffffff;
      text-shadow: 0 0 4px #ffffff, 0 0 8px #ffffff;
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      float: none;
      max-width: 100%;
      border: none;
    }
    li[data-user="Hugo" i] {
      background-color: var(--user-hugo-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #085212;
    }
    li[data-user="Rafa" i] {
      background-color: var(--user-rafa-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #2a053f;
    }
    li[data-user="Álvaro" i] {
      background-color: var(--user-alvaro-bubble);
      color: var(--text-on-light-bubble);
      border-color: #a09315;
    }
    li[data-user="Sergio" i] {
      background-color: var(--user-sergio-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #092666;
    }

    /* --- ¡NUEVO CSS PARA TIMESTAMP! --- */
    .timestamp {
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.6;
      display: inline-block;
      margin-left: 0.5rem;
      /* Posiciona el timestamp dentro de la burbuja */
      position: absolute;
      right: 1rem;
      bottom: 0.5rem;
    }
    /* Ajuste para que el texto no se solape con el timestamp */
    #messages li.me, #messages li.other {
      padding-bottom: 1.5rem; /* Más espacio abajo */
    }
    #messages li.me .timestamp {
      color: #ffffff; /* Timestamp blanco en burbujas oscuras */
    }
    #messages li.other .timestamp {
      color: inherit; /* Hereda color de la burbuja */
      opacity: 0.5;
    }
    li[data-user="Álvaro" i] .timestamp {
        color: var(--text-on-light-bubble); /* Texto oscuro en burbuja clara */
    }


    /* Formulario */
    #form {
      background: var(--elements-bg); 
      padding: var(--spacing-unit) 1rem;
      display: flex; 
      border-top: 1px solid var(--accent-main);
      align-items: flex-end;
    }
    #input {
      flex-grow: 1;
      font-size: 1rem;
      background: var(--chat-bg);
      color: var(--text-main);
      font-family: var(--font-family);
      border: 1px solid var(--accent-bright);
      padding: var(--spacing-unit);
      border-radius: var(--border-radius) 0 0 var(--border-radius);
      margin-right: 0;
      border-right: none;
      resize: none;
      overflow-y: auto;
      max-height: 150px;
      line-height: 1.4;
    }
    #input:focus { outline: none; }
    #form > button {
      background: var(--accent-main);
      border: 1px solid var(--accent-main);
      outline: none;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 0 var(--border-radius) var(--border-radius) 0;
      padding: var(--spacing-unit);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      align-self: stretch;
      box-sizing: border-box;
      height: auto;
    }
    #form > button:hover {
      background-color: var(--accent-bright);
      border-color: var(--accent-bright);
      color: var(--chat-bg);
    }
    
    /* --- ¡NUEVO CSS PARA INDICADOR DE ESCRITURA! --- */
    #typing-indicator {
      height: 1.25rem; /* Altura fija para que no salte la UI */
      padding: 0 1.5rem;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--text-dim);
      background: var(--elements-bg);
    }

    /* Estilos para Markdown */
    code {
      background-color: var(--chat-bg);
      padding: 2px 4px;
      border-radius: 4px;
      font-family: var(--font-family);
    }
    .spoiler {
      background-color: var(--elements-bg);
      color: transparent;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.1s ease-in-out;
    }
    .spoiler.revealed {
      background-color: transparent;
      color: inherit;
    }


    /* --- Lista de Usuarios Online (Sin cambios) --- */
    #user-list-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(13, 13, 26, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 200;
      backdrop-filter: blur(10px);
      transition: opacity 0.2s ease-out;
      opacity: 0;
    }
    #user-list-overlay.visible {
        opacity: 1;
    }
    #user-list-box {
      background-color: rgba(26, 26, 46, 0.8);
      padding: 2.5rem;
      border-radius: 25px;
      border: 1px solid var(--accent-bright);
      width: 300px;
      max-height: 70%;
      overflow-y: auto;
      box-shadow: 0 0 35px 12px rgba(0, 240, 255, 0.6);
      backdrop-filter: blur(5px);
    }
    #user-list-box h2 {
      margin-top: 0;
      color: var(--accent-bright);
      text-align: center;
      text-shadow: 0 0 6px var(--accent-bright);
      margin-bottom: 1.5rem;
    }
    #user-list-ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    #user-list-ul li {
      padding: var(--spacing-unit) * 1.5 var(--spacing-unit);
      margin-bottom: var(--spacing-unit) / 2;
      border-radius: var(--border-radius);
      font-size: 1.2rem;
      text-align: center;
      border: 1px solid rgba(58, 64, 77, 0.3);
      background-color: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      transition: all 0.2s ease;
    }
    #user-list-ul li:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    #user-list-ul li[data-user="Hugo" i] {
      color: var(--user-hugo-base);
      text-shadow: 0 0 5px var(--user-hugo-glow);
    }
    #user-list-ul li[data-user="Rafa" i] {
      color: var(--user-rafa-base);
      text-shadow: 0 0 5px var(--user-rafa-glow);
    }
    #user-list-ul li[data-user="Álvaro" i] {
      color: var(--user-alvaro-base);
      text-shadow: 0 0 5px var(--user-alvaro-glow);
    }
    #user-list-ul li[data-user="Sergio" i] {
      color: var(--user-sergio-base);
      text-shadow: 0 0 5px var(--user-sergio-glow);
    }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div id="login-box">
      <h1>[ INICIAR SESIÓN ]</h1>
      <p>Selecciona tu perfil</p>
      
      <div id="login-profiles">
        <div class="profile-card" data-username="Rafa">
          <img src="/images/Rafa.png" alt="Rafa">
          <div class="profile-name">Rafa</div>
        </div>
        <div class="profile-card" data-username="Hugo">
          <img src="/images/Hugo.png" alt="Hugo">
          <div class="profile-name">Hugo</div>
        </div>
        <div class="profile-card" data-username="Sergio">
          <img src="/images/Sergio.png" alt="Sergio">
          <div class="profile-name">Sergio</div>
        </div>
        <div class="profile-card" data-username="Álvaro">
          <img src="/images/Álvaro.png" alt="Álvaro">
          <div class="profile-name">Álvaro</div>
        </div>
      </div>
      
      <p id="login-error">Nombre de usuario no válido // Acceso Denegado</p>
    </div>
  </div>

  <div id="user-list-overlay">
    <div id="user-list-box">
      <h2>[ CONECTADOS ]</h2>
      <ul id="user-list-ul">
      </ul>
    </div>
  </div>

  <div id="chat-container">
    <div id="chat-header">
      <h2>Chat Privado <span>// Conectado</span></h2>
    </div>
    <ul id="messages"></ul>
    
    <div id="typing-indicator"></div>
    
    <form id="form" action="">
      <textarea id="input" autocomplete="off" placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1rem" height="1rem" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>


  <script src="/socket.io/socket.io.js"></script>
  <script>
    
    const socket = io({ 
      transports: ['websocket'], 
      upgrade: false 
    });

    // (Definiciones de variables)
    const loginOverlay = document.getElementById('login-overlay');
    const chatContainer = document.getElementById('chat-container');
    const loginError = document.getElementById('login-error');
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const userListOverlay = document.getElementById('user-list-overlay');
    const userListUl = document.getElementById('user-list-ul');
    const typingIndicator = document.getElementById('typing-indicator');

    let myUsername = '';
    let escPressed = false;

    // --- ¡NUEVAS FUNCIONES DE PARSEO! ---

    function escapeHTML(str) {
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
    }

    function parseDiscordMarkdown(rawText) {
      let text = escapeHTML(rawText);
      text = text.replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.*?)__/g, '<u>$1</u>');
      text = text.replace(/~~(.*?)~~/g, '<s>$1</s>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/_(.*?)_/g, '<em>$1</em>');
      text = text.replace(/`(.*?)`/g, '<code>$1</code>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    
    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }
    
    // --- ¡NUEVA FUNCIÓN DE TIMESTAMP! ---
    function formatTimestamp(unixTimestamp) {
      const date = new Date(unixTimestamp * 1000); // JS usa milisegundos
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    // --- ¡NUEVA LÓGICA DE LOGIN! ---
    
    document.querySelectorAll('.profile-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const name = e.currentTarget.dataset.username;
        if (!name) return;

        socket.emit('login', name, (success) => {
          if (success) {
            myUsername = name;
            loginOverlay.style.visibility = 'hidden';
            chatContainer.style.visibility = 'visible';
            input.focus();
          } else {
            loginError.style.visibility = 'visible';
          }
        });
      });
    });

    // --- ¡LÓGICA DE FORMULARIO MODIFICADA! ---
    
    function sendMessage() {
      const messageText = input.value.trim();
      if (messageText) {
        if (messageText === '/clear_chat') {
          socket.emit('clear chat request');
        } else {
          socket.emit('chat message', messageText);
        }
        input.value = '';
        autoResizeTextarea(input);
        input.focus();
        socket.emit('stop typing'); // Avisa que paró de escribir al enviar
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    input.addEventListener('input', () => {
        autoResizeTextarea(input);
    });

    // --- ¡NUEVA LÓGICA DE INDICADOR DE ESCRITURA! ---
    let typingTimer;
    let isTyping = false;
    
    input.addEventListener('input', () => {
        autoResizeTextarea(input);
        
        if (!isTyping) {
            isTyping = true;
            socket.emit('typing');
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            isTyping = false;
            socket.emit('stop typing');
        }, 2000); // 2 segundos de espera
    });
    
    let typers = new Set();
    
    function updateTypingUI() {
        if (typers.size === 0) {
            typingIndicator.textContent = '';
        } else {
            let names = Array.from(typers);
            if (names.length === 1) {
                typingIndicator.textContent = `${names[0]} está escribiendo...`;
            } else if (names.length === 2) {
                typingIndicator.textContent = `${names[0]} y ${names[1]} están escribiendo...`;
            } else {
                typingIndicator.textContent = `Varios usuarios están escribiendo...`;
            }
        }
    }
    
    socket.on('user typing', (username) => {
        typers.add(username);
        updateTypingUI();
    });
    
    socket.on('user stop typing', (username) => {
        typers.delete(username);
        updateTypingUI();
    });
    
    // --- ¡FUNCIÓN 'addMessage' MODIFICADA! ---
    function addMessage(data, type = 'chat') {
      const item = document.createElement('li');
      if (type === 'system') {
        item.textContent = data;
        item.className = 'system';
      } else { 
        item.dataset.user = data.user;
        
        const formattedText = parseDiscordMarkdown(data.text);
        const time = formatTimestamp(data.timestamp);

        if (data.user === myUsername) {
          item.className = 'me';
          // Añadimos el texto y el timestamp
          item.innerHTML = `${formattedText} <span class="timestamp">${time}</span>`;
        } else {
          item.className = 'other';
          item.innerHTML = `<strong>${data.user}</strong>${formattedText} <span class="timestamp">${time}</span>`;
        }
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    // (Resto de eventos sin cambios)
    socket.on('chat message', (data) => addMessage(data, 'chat'));
    socket.on('system message', (msg) => addMessage(msg, 'system'));
    socket.on('chat history', (history) => {
      history.forEach((data) => addMessage(data, 'chat'));
    });
    socket.on('chat cleared', () => { messages.innerHTML = ''; });

    socket.on('update user list', (users) => {
      userListUl.innerHTML = '';
      users.forEach(user => {
        const item = document.createElement('li');
        item.textContent = user;
        item.dataset.user = user;
        userListUl.appendChild(item);
      });
    });

    window.addEventListener('keydown', (e) => {
      if (myUsername && e.key === 'Escape' && !escPressed) {
        escPressed = true;
        userListOverlay.style.display = 'flex';
        setTimeout(() => {
            userListOverlay.classList.add('visible');
        }, 10);
      }
    });

    window.addEventListener('keyup', (e) => {
      if (myUsername && e.key === 'Escape') {
        escPressed = false;
        userListOverlay.classList.remove('visible');
        userListOverlay.addEventListener('transitionend', function handler() {
            if (!userListOverlay.classList.contains('visible')) {
                userListOverlay.style.display = 'none';
                userListOverlay.removeEventListener('transitionend', handler);
            }
        });
      }
    });
    
  </script>
</body>
</html>

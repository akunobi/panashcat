<!DOCTYPE html>
<html>
<head>
  <title>Chat Privado // NEON_TERMINAL</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
    :root {
      /* Paleta General */
      --chat-bg: #0d0d1a;
      --elements-bg: #1a1a2e;
      --text-main: #c0c5ce;
      --text-dim: #7f8c8d;
      --accent-main: #f000ff;
      --accent-bright: #00f0ff;
      
      /* --- TU PALETA PARA BURBUJAS --- */
      --user-rafa-bubble: #3F085E;
      --user-hugo-bubble: #0B6A16;
      --user-sergio-bubble: #0D368C;
      --user-alvaro-bubble: #C2B119;

      /* Colores de texto para las burbujas */
      --text-on-dark-bubble: #ffffff;
      --text-on-light-bubble: #0d0d1a;

      /* Colores Neón (para lista de usuarios) */
      --user-hugo-glow: #aaffb2;
      --user-rafa-glow: #e0aaff;
      --user-alvaro-glow: #fff5a1;
      --user-sergio-glow: #aaccff;

      --font-family: 'Consolas', 'Monaco', monospace;
      --border-radius: 16px;
      --spacing-unit: 0.75rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 15px 3px rgba(240, 0, 255, 0.3); }
      50% { box-shadow: 0 0 25px 8px rgba(240, 0, 255, 0.7); }
      100% { box-shadow: 0 0 15px 3px rgba(240, 0, 255, 0.3); }
    }
    body {
      margin: 0; font-family: var(--font-family); color: var(--text-main);
      background-color: var(--chat-bg);
      background-image: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 6px 100%;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--elements-bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent-main); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-bright); }
    
    /* --- CSS LOGIN --- */
    #login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(13, 13, 26, 0.8);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; backdrop-filter: blur(5px);
    }
    #login-box {
      background-color: var(--elements-bg); padding: 2.5rem;
      border-radius: var(--border-radius); text-align: center;
      border: 1px solid var(--accent-main);
      animation: pulse-glow 3s infinite ease-in-out;
    }
    #login-box h1 {
      margin-top: 0; color: var(--accent-bright); font-weight: 300;
      text-shadow: 0 0 4px var(--accent-bright), 0 0 8px var(--accent-bright);
    }
    #login-box p { color: var(--text-dim); }
    #login-profiles {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
    }
    .profile-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease-out;
    }
    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid transparent;
      object-fit: cover;
      margin-bottom: 0.5rem;
    }
    .profile-card:hover img {
      border-color: var(--accent-bright);
      transform: scale(1.1);
    }
    .profile-card:hover .profile-name {
      color: var(--accent-bright);
      text-shadow: 0 0 5px var(--accent-bright);
    }
    .profile-name {
      font-size: 1.1rem;
      color: var(--text-main);
      transition: all 0.2s ease-out;
    }
    
    /* --- CSS CHAT --- */
    #chat-container {
      display: flex; flex-direction: column;
      height: 100vh; visibility: hidden;
    }
    #chat-header {
      background: var(--elements-bg); padding: var(--spacing-unit) * 1.5;
      border-bottom: 1px solid var(--accent-main);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center; z-index: 10;
    }
    #chat-header h2 {
      margin: 0; color: var(--text-main); font-weight: 300;
    }
    #chat-header h2 span {
      color: var(--accent-bright); font-weight: 600;
      text-shadow: 0 0 5px var(--accent-bright);
    }
    #messages {
      list-style-type: none; margin: 0;
      padding: var(--spacing-unit) * 1.5; flex-grow: 1; overflow-y: auto;
    }
    #messages li {
      max-width: 80%;
      clear: both;
      animation: fadeIn 0.3s ease-out;
      position: relative;
      margin-bottom: var(--spacing-unit) * 1.5;
    }
    
    /* Contenedor del Mensaje */
    .message-container {
      display: flex;
      align-items: center;
      width: 100%;
      position: relative;
    }
    
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: var(--spacing-unit);
      flex-shrink: 0;
    }
    
    .message-bubble {
      padding: var(--spacing-unit) 1rem;
      padding-bottom: 1.5rem;
      border-radius: var(--border-radius);
      word-wrap: break-word;
      line-height: 1.4;
      border: 1px solid transparent;
      position: relative;
      width: 100%;
    }
    
    /* Burbujas de OTROS */
    #messages li.other {
      float: left;
    }
    #messages li.other .message-bubble strong {
      display: block; font-size: 0.8rem;
      margin-bottom: 0.2rem;
      color: inherit;
      opacity: 0.7;
      text-shadow: none;
    }

    /* Burbujas MÍAS */
    #messages li.me {
      float: right;
    }
    #messages li.me .message-container {
      flex-direction: row-reverse;
    }
    #messages li.me .avatar {
      margin-right: 0;
      margin-left: var(--spacing-unit);
    }

    /* Burbujas de SISTEMA */
    #messages li.system {
      display: block;
      background-color: transparent;
      color: #ffffff;
      text-shadow: 0 0 4px #ffffff, 0 0 8px #ffffff;
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      float: none;
      max-width: 100%;
      border: none;
    }
    
    /* Colores de Burbujas por Usuario */
    li[data-user="Hugo" i] .message-bubble {
      background-color: var(--user-hugo-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #085212;
    }
    li[data-user="Rafa" i] .message-bubble {
      background-color: var(--user-rafa-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #2a053f;
    }
    li[data-user="Álvaro" i] .message-bubble {
      background-color: var(--user-alvaro-bubble);
      color: var(--text-on-light-bubble);
      border-color: #a09315;
    }
    li[data-user="Sergio" i] .message-bubble {
      background-color: var(--user-sergio-bubble);
      color: var(--text-on-dark-bubble);
      border-color: #092666;
    }

    /* Timestamp */
    .timestamp {
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.6;
      display: inline-block;
      margin-left: 0.5rem;
      position: absolute;
      right: 1rem;
      bottom: 0.5rem;
    }
    #messages li.me .timestamp {
      color: #ffffff;
    }
    #messages li.other .timestamp {
      color: inherit;
      opacity: 0.5;
    }
    li[data-user="Álvaro" i] .timestamp {
        color: var(--text-on-light-bubble);
    }
    
    /* Botones de Acción (Reply, Delete) */
    .message-actions {
      position: absolute;
      top: -15px;
      padding: 2px;
      background-color: var(--elements-bg);
      border-radius: 8px;
      border: 1px solid var(--accent-bright);
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      display: none;
    }
    #messages li:hover .message-actions {
      display: flex;
    }
    #messages li.me:hover .message-actions {
      right: 50px;
    }
    #messages li.other:hover .message-actions {
      left: 50px;
    }
    .action-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      margin: 0 2px;
      font-size: 1.1rem;
    }
    .action-btn:hover {
      color: var(--accent-bright);
    }
    
    /* Referencia de Respuesta (Estilo Discord) */
    .reply-reference {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      cursor: pointer;
      padding-left: 52px; /* 40px avatar + 12px margin */
    }
    #messages li.me .reply-reference {
      padding-left: 0;
      padding-right: 52px;
      text-align: right;
    }
    .reply-reference strong {
      color: var(--text-main);
    }
    .reply-reference:hover {
      text-decoration: underline;
    }
    
    /* Highlight para mensaje respondido */
    @keyframes highlight-fade {
      from { 
        border-color: var(--accent-bright);
        box-shadow: 0 0 10px var(--accent-bright);
      }
      to {
        border-color: transparent;
        box-shadow: none;
      }
    }
    li.highlight .message-bubble {
      animation: highlight-fade 1.5s ease-out;
    }

    /* Contexto de Respuesta (Barra inferior) */
    #reply-context {
      display: none;
      padding: 0.5rem 1.5rem;
      background-color: var(--chat-bg);
      border-top: 1px solid var(--accent-main);
      color: var(--text-dim);
      font-size: 0.8rem;
    }
    #reply-context-text {
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #close-reply {
      float: right;
      cursor: pointer;
      margin-left: 1rem;
      color: var(--accent-bright);
    }

    /* Formulario de Input */
    #form {
      background: var(--elements-bg); 
      padding: var(--spacing-unit) 1rem;
      display: flex; 
      border-top: 1px solid var(--accent-main);
      align-items: flex-end;
    }
    #input {
      flex-grow: 1; font-size: 1rem; background: var(--chat-bg);
      color: var(--text-main); font-family: var(--font-family);
      border: 1px solid var(--accent-bright); padding: var(--spacing-unit);
      border-radius: var(--border-radius) 0 0 var(--border-radius);
      margin-right: 0; border-right: none; resize: none;
      overflow-y: auto; max-height: 150px; line-height: 1.4;
    }
    #input:focus { outline: none; }
    #form > button {
      background: var(--accent-main); border: 1px solid var(--accent-main);
      outline: none; color: white; cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 0 var(--border-radius) var(--border-radius) 0;
      padding: var(--spacing-unit); display: flex;
      align-items: center; justify-content: center; font-size: 0;
      align-self: stretch; box-sizing: border-box; height: auto;
    }
    #form > button:hover {
      background-color: var(--accent-bright);
      border-color: var(--accent-bright);
      color: var(--chat-bg);
    }
    
    /* Indicador de Escritura */
    #typing-indicator {
      height: 1.25rem; padding: 0 1.5rem;
      font-size: 0.8rem; font-style: italic;
      color: var(--text-dim); background: var(--elements-bg);
    }

    /* Estilos Markdown */
    code {
      background-color: var(--chat-bg); padding: 2px 4px;
      border-radius: 4px; font-family: var(--font-family);
    }
    .spoiler {
      background-color: var(--elements-bg); color: transparent;
      cursor: pointer; border-radius: 4px;
      transition: background-color 0.1s ease-in-out;
    }
    .spoiler.revealed {
      background-color: transparent; color: inherit;
    }
    
    /* Lista de Usuarios Online */
    #user-list-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(13, 13, 26, 0.8);
      display: none; justify-content: center; align-items: center;
      z-index: 200; backdrop-filter: blur(10px);
      transition: opacity 0.2s ease-out; opacity: 0;
    }
    #user-list-overlay.visible {
        opacity: 1;
    }
    #user-list-box {
      background-color: rgba(26, 26, 46, 0.8);
      padding: 2.5rem; border-radius: 25px;
      border: 1px solid var(--accent-bright);
      width: 300px; max-height: 70%;
      overflow-y: auto;
      box-shadow: 0 0 35px 12px rgba(0, 240, 255, 0.6);
      backdrop-filter: blur(5px);
    }
    #user-list-box h2 {
      margin-top: 0; color: var(--accent-bright);
      text-align: center; text-shadow: 0 0 6px var(--accent-bright);
      margin-bottom: 1.5rem;
    }
    #user-list-ul {
      list-style-type: none; padding: 0; margin: 0;
    }
    #user-list-ul li {
      padding: var(--spacing-unit) * 1.5 var(--spacing-unit);
      margin-bottom: var(--spacing-unit) / 2;
      border-radius: var(--border-radius);
      font-size: 1.2rem; text-align: center;
      border: 1px solid rgba(58, 64, 77, 0.3);
      background-color: rgba(255, 255, 255, 0.08);
      color: var(--text-main); transition: all 0.2s ease;
    }
    #user-list-ul li:last-child {
      border-bottom: none; margin-bottom: 0;
    }
    #user-list-ul li[data-user="Hugo" i] {
      color: var(--user-hugo-base);
      text-shadow: 0 0 5px var(--user-hugo-glow);
    }
    #user-list-ul li[data-user="Rafa" i] {
      color: var(--user-rafa-base);
      text-shadow: 0 0 5px var(--user-rafa-glow);
    }
    #user-list-ul li[data-user="Álvaro" i] {
      color: var(--user-alvaro-base);
      text-shadow: 0 0 5px var(--user-alvaro-glow);
    }
    #user-list-ul li[data-user="Sergio" i] {
      color: var(--user-sergio-base);
      text-shadow: 0 0 5px var(--user-sergio-glow);
    }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div id="login-box">
      <h1>[ INICIAR SESIÓN ]</h1>
      <p>Selecciona tu perfil</p>
      <div id="login-profiles">
        <div class="profile-card" data-username="Rafa">
          <img src="/images/Rafa.png" alt="Rafa">
          <div class="profile-name">Rafa</div>
        </div>
        <div class="profile-card" data-username="Hugo">
          <img src="/images/Hugo.png" alt="Hugo">
          <div class="profile-name">Hugo</div>
        </div>
        <div class="profile-card" data-username="Sergio">
          <img src="/images/Sergio.png" alt="Sergio">
          <div class="profile-name">Sergio</div>
        </div>
        <div class="profile-card" data-username="Álvaro">
          <img src="/images/Álvaro.png" alt="Álvaro">
          <div class="profile-name">Álvaro</div>
        </div>
      </div>
      <p id="login-error">Nombre de usuario no válido // Acceso Denegado</p>
    </div>
  </div>

  <div id="user-list-overlay">
    <div id="user-list-box">
      <h2>[ CONECTADOS ]</h2>
      <ul id="user-list-ul">
      </ul>
    </div>
  </div>

  <div id="chat-container">
    <div id="chat-header">
      <h2>Chat Privado <span>// Conectado</span></h2>
    </div>
    <ul id="messages"></ul>
    <div id="reply-context">
      <span id="close-reply">✖</span>
      Respondiendo a <strong id="reply-context-user"></strong>
      <div id="reply-context-text"></div>
    </div>
    <div id="typing-indicator"></div>
    <form id="form" action="">
      <textarea id="input" autocomplete="off" placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1rem" height="1rem" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>


  <script src="/socket.io/socket.io.js"></script>
  <script>
    
    const socket = io({ 
      transports: ['websocket'], 
      upgrade: false 
    });

    // (Definiciones de variables)
    const loginOverlay = document.getElementById('login-overlay');
    const chatContainer = document.getElementById('chat-container');
    const loginError = document.getElementById('login-error');
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const userListOverlay = document.getElementById('user-list-overlay');
    const userListUl = document.getElementById('user-list-ul');
    const typingIndicator = document.getElementById('typing-indicator');
    const replyContext = document.getElementById('reply-context');
    const replyContextUser = document.getElementById('reply-context-user');
    const replyContextText = document.getElementById('reply-context-text');
    const closeReplyBtn = document.getElementById('close-reply');
    
    let myUsername = '';
    let escPressed = false;
    let currentReplyToId = null;

    // (Funciones de Parseo y Utilidad)
    function escapeHTML(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
    function parseDiscordMarkdown(rawText) {
      let text = escapeHTML(rawText);
      text = text.replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__(.*?)__/g, '<u>$1</u>');
      text = text.replace(/~~(.*?)~~/g, '<s>$1</s>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/_(.*?)_/g, '<em>$1</em>');
      text = text.replace(/`(.*?)`/g, '<code>$1</code>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }
    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }
    function formatTimestamp(unixTimestamp) {
      const date = new Date(unixTimestamp * 1000);
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }
    function getAvatarUrl(username) {
      return `/images/${username}.png`;
    }

    // (Lógica de Login)
    document.querySelectorAll('.profile-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const name = e.currentTarget.dataset.username;
        if (!name) return;
        socket.emit('login', name, (success) => {
          if (success) {
            myUsername = name;
            loginOverlay.style.visibility = 'hidden';
            chatContainer.style.visibility = 'visible';
            input.focus();
          } else {
            loginError.style.visibility = 'visible';
          }
        });
      });
    });

    // (Lógica de Formulario y "Está Escribiendo")
    function sendMessage() {
      const messageText = input.value.trim();
      if (messageText) {
        if (messageText === '/clear_chat') {
          socket.emit('clear chat request');
        } else {
          socket.emit('chat message', messageText, currentReplyToId);
        }
        input.value = '';
        autoResizeTextarea(input);
        input.focus();
        socket.emit('stop typing');
        cancelReply();
      }
    }
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
      if (e.key === 'Escape' && currentReplyToId) {
        cancelReply();
      }
    });
    input.addEventListener('input', () => {
        autoResizeTextarea(input);
    });
    let typingTimer;
    let isTyping = false;
    input.addEventListener('input', () => {
        autoResizeTextarea(input);
        if (!isTyping) {
            isTyping = true;
            socket.emit('typing');
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            isTyping = false;
            socket.emit('stop typing');
        }, 2000);
    });
    let typers = new Set();
    function updateTypingUI() {
        if (typers.size === 0) {
            typingIndicator.textContent = '';
        } else {
            let names = Array.from(typers);
            if (names.length === 1) {
                typingIndicator.textContent = `${names[0]} está escribiendo...`;
            } else if (names.length === 2) {
                typingIndicator.textContent = `${names[0]} y ${names[1]} están escribiendo...`;
            } else {
                typingIndicator.textContent = `Varios usuarios están escribiendo...`;
            }
        }
    }
    socket.on('user typing', (username) => {
        typers.add(username);
        updateTypingUI();
    });
    socket.on('user stop typing', (username) => {
        typers.delete(username);
        updateTypingUI();
    });
    
    // (Lógica de Respuestas)
    function startReply(messageId) {
      const msgLi = document.getElementById(messageId);
      if (!msgLi) return;
      
      const originalUser = msgLi.dataset.user;
      const originalText = msgLi.querySelector('.message-text-content').textContent;
      
      currentReplyToId = parseInt(messageId.split('-')[1]);
      
      replyContextUser.textContent = originalUser;
      replyContextText.textContent = originalText;
      replyContext.style.display = 'block';
      input.focus();
    }
    function cancelReply() {
      currentReplyToId = null;
      replyContext.style.display = 'none';
    }
    closeReplyBtn.addEventListener('click', cancelReply);

    // --- ¡FUNCIÓN 'addMessage' MODIFICADA! ---
    function addMessage(data, type = 'chat') {
      const item = document.createElement('li');
      
      if (type === 'system') {
        item.textContent = data;
        item.className = 'system';
      } else { 
        item.id = `msg-${data.id}`;
        item.dataset.user = data.user;
        
        const formattedText = parseDiscordMarkdown(data.text);
        const time = formatTimestamp(data.timestamp);
        
        // 1. (¡NUEVO!) Crear el bloque de respuesta si existe
        if (data.reply_to_id) {
          const originalMsg = document.getElementById(`msg-${data.reply_to_id}`);
          if (originalMsg) {
            const originalUser = originalMsg.dataset.user;
            
            const replyRef = document.createElement('div');
            replyRef.className = 'reply-reference';
            replyRef.innerHTML = `↩️ Respondiendo a <strong>${originalUser}</strong>`;
            replyRef.dataset.replyId = `msg-${data.reply_to_id}`;
            
            item.appendChild(replyRef);
          }
        }

        // 2. Crear el Avatar
        const avatar = document.createElement('img');
        avatar.src = getAvatarUrl(data.user);
        avatar.className = 'avatar';
        
        // 3. Crear el contenedor de la burbuja
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        // 4. Crear el contenido de texto
        const textContent = document.createElement('div');
        textContent.className = 'message-text-content';
        
        // 5. Añadir nombre, texto y timestamp
        if (data.user === myUsername) {
          item.className = 'me';
          textContent.innerHTML = `${formattedText} <span class="timestamp">${time}</span>`;
        } else {
          item.className = 'other';
          textContent.innerHTML = `<strong>${data.user}</strong>${formattedText} <span class="timestamp">${time}</span>`;
        }
        bubble.appendChild(textContent);
        
        // 6. Crear botones de acción
        const actions = document.createElement('div');
        actions.className = 'message-actions';
        
        const replyBtn = document.createElement('button');
        replyBtn.className = 'action-btn reply-btn';
        replyBtn.innerHTML = '↩️';
        replyBtn.dataset.messageId = item.id;
        actions.appendChild(replyBtn);

        if (data.user === myUsername) {
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'action-btn delete-btn';
          deleteBtn.innerHTML = '🗑️';
          deleteBtn.dataset.messageId = item.id;
          actions.appendChild(deleteBtn);
        }

        // 7. Ensamblar todo
        const msgContainer = document.createElement('div');
        msgContainer.className = 'message-container';
        msgContainer.appendChild(avatar);
        msgContainer.appendChild(bubble);
        msgContainer.appendChild(actions);
        
        // 8. Añadir el contenedor al 'li'
        item.appendChild(msgContainer);
      }
      
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    // --- (Eventos de Socket.IO) ---
    
    // Listener de clic para botones de acción (Delegación de eventos)
    messages.addEventListener('click', (e) => {
      const replyBtn = e.target.closest('.reply-btn');
      if (replyBtn) {
        const messageId = replyBtn.dataset.messageId;
        startReply(messageId);
        return;
      }
      
      const deleteBtn = e.target.closest('.delete-btn');
      if (deleteBtn) {
        const messageId = deleteBtn.dataset.messageId;
        const msgIdNumber = parseInt(messageId.split('-')[1]);
        if (confirm('¿Seguro que quieres borrar este mensaje?')) {
          socket.emit('delete message', msgIdNumber);
        }
        return;
      }
      
      const replyRef = e.target.closest('.reply-reference');
      if (replyRef) {
        const messageId = replyRef.dataset.replyId;
        const originalMsg = document.getElementById(messageId);
        if (originalMsg) {
          originalMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
          originalMsg.classList.add('highlight');
          setTimeout(() => {
            originalMsg.classList.remove('highlight');
          }, 1500);
        }
        return;
      }
    });
    
    // Listener para cuando un mensaje es borrado por el servidor
    socket.on('message deleted', (messageId) => {
      const item = document.getElementById(`msg-${messageId}`);
      if (item) {
        item.remove();
      }
    });

    socket.on('chat message', (data) => addMessage(data, 'chat'));
    socket.on('system message', (msg) => addMessage(msg, 'system'));
    socket.on('chat history', (history) => {
      messages.innerHTML = ''; // Limpiar historial viejo
      history.forEach((data) => addMessage(data, 'chat'));
    });
    socket.on('chat cleared', () => { 
      messages.innerHTML = ''; 
    });

    socket.on('update user list', (users) => {
      userListUl.innerHTML = '';
      users.forEach(user => {
        const item = document.createElement('li');
        item.textContent = user;
        item.dataset.user = user;
        userListUl.appendChild(item);
      });
    });

    // (Lógica de ESC para lista de usuarios)
    window.addEventListener('keydown', (e) => {
      if (myUsername && e.key === 'Escape' && !escPressed) {
        escPressed = true;
        userListOverlay.style.display = 'flex';
        setTimeout(() => {
            userListOverlay.classList.add('visible');
        }, 10);
      }
    });

    window.addEventListener('keyup', (e) => {
      if (myUsername && e.key === 'Escape') {
        escPressed = false;
        userListOverlay.classList.remove('visible');
        userListOverlay.addEventListener('transitionend', function handler() {
            if (!userListOverlay.classList.contains('visible')) {
                userListOverlay.style.display = 'none';
                userListOverlay.removeEventListener('transitionend', handler);
            }
        });
      }
    });
    
  </script>
</body>
</html>
